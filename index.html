<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>정산 링크</title>
    <link rel="stylesheet" href="./styles.css?v=48" />
  </head>
  <body>
    <div class="app-shell" data-active-tab="expenses">
      <header class="topbar">
        <div>
          <p class="eyebrow">Settle up</p>
          <h1 id="appTitle">정산 링크</h1>
          <p class="app-subtitle" id="appSubtitle">정산 기록을 불러오는 중입니다.</p>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="resetButton" type="button" title="초기화" aria-label="초기화">↺</button>
        </div>
      </header>

      <main class="workspace">
        <section class="summary-panel">
          <div class="trip-manager">
            <label for="tripSelect">정산 선택</label>
            <select id="tripSelect"></select>
            <div class="trip-actions" aria-label="정산 관리">
              <button id="newTripButton" type="button">새 정산</button>
              <button id="duplicateTripButton" type="button">복제</button>
              <button id="deleteTripButton" type="button">정산 삭제</button>
            </div>
          </div>

          <div class="trip-card">
            <label for="tripName">정산 이름</label>
            <input id="tripName" type="text" autocomplete="off" />
            <input id="tripDate" type="hidden" />
            <div class="trip-meta">
              <div>
                <label for="tripStartDate">시작일</label>
                <input id="tripStartDate" type="date" />
              </div>
              <div>
                <label for="tripEndDate">종료일</label>
                <input id="tripEndDate" type="date" />
              </div>
              <div>
                <label for="settlementCurrency">정산 기준 통화</label>
                <select id="settlementCurrency">
                  <option value="KRW">KRW</option>
                  <option value="JPY">JPY</option>
                  <option value="USD">USD</option>
                  <option value="THB">THB</option>
                  <option value="VND">VND</option>
                  <option value="CNY">CNY</option>
                  <option value="EUR">EUR</option>
                </select>
              </div>
            </div>
          </div>

          <div class="metric-grid">
            <div class="metric">
              <span>총 지출</span>
              <strong id="totalSpend">0원</strong>
            </div>
            <div class="metric">
              <span>1인 예상</span>
              <strong id="perPerson">0원</strong>
            </div>
            <div class="metric">
              <span>정산 건수</span>
              <strong id="settlementCount">0건</strong>
            </div>
          </div>

        </section>

        <section class="content-panel">
          <nav class="tabs" aria-label="정산 메뉴">
            <button class="tab is-active" data-tab="expenses" type="button">내역</button>
            <button class="tab" data-tab="import" type="button">가져오기</button>
            <button class="tab" data-tab="settle" type="button">정산</button>
          </nav>

          <section class="tab-page is-active" id="expensesPage">
            <div class="settlement-report" id="settlementReport">
              <div class="report-head">
                <div>
                  <p class="eyebrow">Settlement</p>
                  <h2 id="reportTripName">각자 낼 돈</h2>
                </div>
                <span id="reportSubtitle">자동 계산</span>
              </div>
              <h3 class="payment-title">💸 각자 낼 돈</h3>
              <div class="payment-table" id="paymentTable"></div>
              <div class="send-to-card">
                <div class="section-head">
                  <h2>🏦 보내실 곳</h2>
                  <span>계좌번호 복사</span>
                </div>
                <div class="account-line" id="accountLine"></div>
                <button class="primary-button full-button" id="copyAccountButton" type="button">계좌번호 복사하기</button>
              </div>
            </div>
            <div class="expense-toolbar">
              <div>
                <h2>🧾 결제 내역</h2>
                <p id="expenseSummary">0건</p>
              </div>
              <div class="sort-box" aria-label="결제 내역 정렬">
                <label for="expenseSortKey">정렬</label>
                <select id="expenseSortKey">
                  <option value="date">결제일</option>
                  <option value="amount">금액</option>
                  <option value="title">내용</option>
                </select>
                <button id="expenseSortDirection" type="button" title="정렬 방향" aria-label="정렬 방향">↓</button>
              </div>
            </div>
            <div class="expense-table" id="expenseList"></div>
            <div class="bulk-panel" id="bulkPanel">
              <div class="bulk-head">
                <strong id="bulkSelectionCount">0건 선택</strong>
                <div>
                  <button id="selectAllExpensesButton" type="button">전체 선택</button>
                  <button id="clearExpenseSelectionButton" type="button">선택 해제</button>
                </div>
              </div>
              <div class="bulk-grid">
                <input id="bulkCategory" type="text" placeholder="태그 일괄 변경 예: 식비, 교통" />
                <select id="bulkPayer" aria-label="결제자 일괄 변경">
                  <option value="">결제자 유지</option>
                </select>
                <select id="bulkSplitMode" aria-label="부담 방식 일괄 변경">
                  <option value="keep">분담 유지</option>
                  <option value="equal">전체 인원 분할</option>
                  <option value="single">한 사람 부담</option>
                  <option value="custom">직접 비율</option>
                </select>
                <select id="bulkSplitPerson" aria-label="부담자 선택"></select>
              </div>
              <div class="bulk-share-inputs" id="bulkShareInputs"></div>
              <div class="bulk-actions">
                <span id="bulkHint">선택한 결제에만 적용됩니다.</span>
                <button class="primary-button" id="applyBulkButton" type="button">선택 항목 적용</button>
              </div>
            </div>
            <form class="expense-form" id="expenseForm">
              <input id="expenseTitle" type="text" placeholder="결제 내용" required />
              <input id="expenseAmount" type="number" inputmode="numeric" min="0" step="1" placeholder="금액" required />
              <select id="expenseCurrency" aria-label="결제 통화">
                <option value="KRW">KRW</option>
                <option value="JPY">JPY</option>
                <option value="USD">USD</option>
                <option value="THB">THB</option>
                <option value="VND">VND</option>
                <option value="CNY">CNY</option>
                <option value="EUR">EUR</option>
              </select>
              <input id="expenseDate" type="date" required />
              <select id="expensePayer" required></select>
              <button class="primary-button" type="submit">추가</button>
            </form>
          </section>

          <section class="tab-page" id="importPage">
            <div class="import-layout">
              <div class="upload-box">
                <label for="ledgerFileInput">엑셀/CSV 가져오기</label>
                <input id="ledgerFileInput" type="file" accept=".xlsx,.csv,.tsv,text/csv,text/tab-separated-values" />
              </div>
              <div class="parser-box">
                <label for="ledgerText">엑셀 또는 카드앱 복사 내용</label>
                <textarea id="ledgerText" placeholder="엑셀: 날짜&#9;자산&#9;분류&#9;소분류&#9;내용&#9;금액(원)&#9;수입/지출&#9;메모&#9;금액&#9;화폐&#10;카드앱: 06월29일&#10;[가맹점](...)&#10;[44,400원](...)&#10;[01:23](...)"></textarea>
                <div class="parser-actions">
                  <button id="parseTextButton" type="button">텍스트 분석</button>
                  <button id="clearTextButton" type="button">비우기</button>
                </div>
                <p id="importHint">엑셀 표와 KB/신한 등 카드사 이용내역 복사 내용을 분석합니다.</p>
              </div>
            </div>
            <div class="rate-box import-rate-box">
              <div class="section-head">
                <h2>환율</h2>
                <span>1 외화 기준</span>
              </div>
              <label for="jpyRate">JPY → KRW</label>
              <input id="jpyRate" type="number" inputmode="decimal" min="0" step="0.01" />
              <label for="usdRate">USD → KRW</label>
              <input id="usdRate" type="number" inputmode="decimal" min="0" step="0.01" />
              <label for="thbRate">THB → KRW</label>
              <input id="thbRate" type="number" inputmode="decimal" min="0" step="0.01" />
              <label for="vndRate">VND → KRW</label>
              <input id="vndRate" type="number" inputmode="decimal" min="0" step="0.0001" />
              <label for="cnyRate">CNY → KRW</label>
              <input id="cnyRate" type="number" inputmode="decimal" min="0" step="0.01" />
              <label for="eurRate">EUR → KRW</label>
              <input id="eurRate" type="number" inputmode="decimal" min="0" step="0.01" />
            </div>
          </section>

          <section class="tab-page" id="settlePage">
            <div class="settings-card people-settings-card">
              <div class="people-box">
                <div class="section-head">
                  <h2>참가자</h2>
                  <span id="peopleCount">0명</span>
                </div>
                <div class="person-add">
                  <input id="personInput" type="text" placeholder="이름 추가" autocomplete="off" />
                  <button id="addPersonButton" type="button" title="참가자 추가" aria-label="참가자 추가">＋</button>
                </div>
                <div class="chip-list" id="peopleList"></div>
              </div>
            </div>
            <div class="settings-card">
              <div class="section-head">
                <h2>🏦 계좌 설정</h2>
                <span>공유 화면에 표시됩니다</span>
              </div>
              <div class="account-editor">
                <div>
                  <label for="accountBank">은행</label>
                  <input id="accountBank" type="text" autocomplete="off" />
                </div>
                <div>
                  <label for="accountNumber">계좌번호</label>
                  <input id="accountNumber" type="text" autocomplete="off" />
                </div>
                <div>
                  <label for="accountHolder">예금주</label>
                  <input id="accountHolder" type="text" autocomplete="off" />
                </div>
              </div>
            </div>
            <div class="settle-actions">
              <button class="primary-button" id="shareButton" type="button">정산 링크 만들기</button>
              <button id="exportImageButton" type="button">전체 이미지 저장</button>
              <button id="exportDataButton" type="button">기록 파일 저장</button>
              <label class="import-data-button" for="dataFileInput">기록 불러오기</label>
              <input id="dataFileInput" type="file" accept="application/json" hidden />
            </div>
            <button class="danger-button full-button" id="clearAllButton" type="button">현재 내역 전체 삭제</button>
            <div class="share-box" id="shareBox" hidden>
              <div>
                <span>공유 링크</span>
                <p id="shareStatus">링크가 만들어졌습니다.</p>
              </div>
              <input id="shareUrl" readonly />
              <button id="copyButton" type="button">복사</button>
            </div>
            <div class="settle-grid">
              <div>
                <div class="section-head">
                  <h2>💰 사람별 잔액</h2>
                  <span>+ 받을 돈 / - 낼 돈</span>
                </div>
                <div class="balance-list" id="balanceList"></div>
              </div>
              <div>
                <div class="section-head">
                  <h2>💳 보낼 돈</h2>
                  <span id="settlementSummary">자동 계산</span>
                </div>
                <div class="settlement-list" id="settlementList"></div>
              </div>
            </div>
          </section>
        </section>
      </main>
    </div>

    <template id="expenseRowTemplate">
      <article class="expense-row">
        <div class="expense-date">
          <strong class="expense-day"></strong>
          <button class="select-expense" type="button" title="일괄 변경 선택" aria-label="일괄 변경 선택">선택</button>
        </div>
        <div class="expense-main">
          <strong class="expense-title"></strong>
          <span class="expense-subline"></span>
          <div class="expense-tags">
            <span class="expense-category"></span>
            <span class="expense-payer"></span>
            <span class="expense-split"></span>
          </div>
        </div>
        <div class="expense-amount">
          <strong class="expense-money"></strong>
          <span class="expense-converted"></span>
        </div>
        <div class="expense-actions">
          <button class="include-toggle" type="button" title="총액 반영 여부" aria-label="총액 반영 여부"></button>
          <button class="edit-expense" type="button" title="수정" aria-label="수정">수정</button>
          <button class="delete-expense" type="button" title="삭제" aria-label="삭제">×</button>
        </div>
      </article>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="./app.js?v=48"></script>
  </body>
</html>
